<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>馬鹿広いメモ帳 (純等幅フォント版)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html, body {
            width: 100%;
            height: 100%;
            background-color: #1e1e1e;
            overflow: hidden; /* 画面全体のスクロールを禁止 */
        }
        /* 画面いっぱいの広大な入力欄 */
        #notepad {
            width: 100%;
            height: 100%;
            border: none;
            outline: none;
            background-color: #1e1e1e;
            color: #ffffff;
            padding: 30px;
            resize: none;
            /* すべてを一貫して monospace（等幅）に指定 */
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            line-height: 1.4;
            white-space: pre-wrap;
            word-wrap: break-word;
            display: block;
            overflow: hidden; /* スクロールバーを完全に非表示 */
        }
    </style>
</head>
<body>

    <textarea id="notepad" placeholder="ここに無限に書き込む...（すべて monospace）"></textarea>

    <script>
        const notepad = document.getElementById('notepad');
        const STORAGE_KEY = 'mega_notepad_content_v4';

        // 1. ローカルストレージからデータを読み込み
        const savedContent = localStorage.getItem(STORAGE_KEY);
        if (savedContent !== null) {
            notepad.value = savedContent;
        }

        // 2. 縦横どちらもスクロールが出ないように文字サイズを自動調整する関数
        function adjustFontSize() {
            let maxFontSize = 60; // 初期最大サイズ
            let minFontSize = 2;  // 最小サイズ
            
            let currentSize = maxFontSize;
            notepad.style.fontSize = currentSize + 'px';

            // 画面からはみ出ている間はフォントサイズを小さくする
            while (
                (notepad.scrollHeight > notepad.clientHeight || notepad.scrollWidth > notepad.clientWidth) 
                && currentSize > minFontSize
            ) {
                currentSize -= 0.5;
                notepad.style.fontSize = currentSize + 'px';
            }
        }

        // 3. 入力時のイベントリスナー
        notepad.addEventListener('input', () => {
            localStorage.setItem(STORAGE_KEY, notepad.value);
            adjustFontSize();
        });

        // 4. 画面サイズ変更時
        window.addEventListener('resize', adjustFontSize);

        // 初回読み込み時に実行
        adjustFontSize();
    </script>
</body>
</html>
