<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>馬鹿広いメモ帳 (フォント切り替え版)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html, body {
            width: 100%;
            height: 100%;
            background-color: #1e1e1e;
            overflow: hidden;
        }
        /* 画面いっぱいの広大な入力欄 */
        #notepad {
            width: 100%;
            height: 100%;
            border: none;
            outline: none;
            background-color: #1e1e1e;
            color: #ffffff;
            padding: 30px;
            resize: none;
            line-height: 1.4;
            white-space: pre-wrap;
            word-wrap: break-word;
            display: block;
            overflow: hidden;
        }
        /* 等幅フォントのスタイル */
        .font-mono {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        }
        /* 通常フォント（プロポーショナル）のスタイル */
        .font-sans {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
    </style>
</head>
<body>

    <textarea id="notepad" class="font-mono" placeholder="ここに無限に書き込む... [Ctrl + Q でフォント切り替え]"></textarea>

    <script>
        const notepad = document.getElementById('notepad');
        const STORAGE_KEY_CONTENT = 'mega_notepad_content_v5';
        const STORAGE_KEY_FONT = 'mega_notepad_font_v5';

        // 1. ローカルストレージからデータとフォント設定を読み込み
        const savedContent = localStorage.getItem(STORAGE_KEY_CONTENT);
        if (savedContent !== null) {
            notepad.value = savedContent;
        }

        const savedFont = localStorage.getItem(STORAGE_KEY_FONT);
        if (savedFont === 'sans') {
            notepad.className = 'font-sans';
        } else {
            notepad.className = 'font-mono'; // デフォルトは等幅
        }

        // 2. 縦横どちらもスクロールが出ないように文字サイズを自動調整する関数
        function adjustFontSize() {
            let maxFontSize = 60;
            let minFontSize = 2;
            
            let currentSize = maxFontSize;
            notepad.style.fontSize = currentSize + 'px';

            while (
                (notepad.scrollHeight > notepad.clientHeight || notepad.scrollWidth > notepad.clientWidth) 
                && currentSize > minFontSize
            ) {
                currentSize -= 0.5;
                notepad.style.fontSize = currentSize + 'px';
            }
        }

        // 3. 入力時のイベントリスナー
        notepad.addEventListener('input', () => {
            localStorage.setItem(STORAGE_KEY_CONTENT, notepad.value);
            adjustFontSize();
        });

        // 4. キーボードショートカットでフォント切り替え (Ctrl + Q または Cmd + Q)
        window.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'q') {
                e.preventDefault(); // ブラウザのデフォルト動作をキャンセル
                
                if (notepad.classList.contains('font-mono')) {
                    notepad.className = 'font-sans';
                    localStorage.setItem(STORAGE_KEY_FONT, 'sans');
                } else {
                    notepad.className = 'font-mono';
                    localStorage.setItem(STORAGE_KEY_FONT, 'mono');
                }
                
                // フォントが変わると文字の幅が変わるので再計算
                adjustFontSize();
            }
        });

        // 5. 画面サイズ変更時
        window.addEventListener('resize', adjustFontSize);

        // 初回読み込み時に実行
        adjustFontSize();
    </script>
</body>
</html>
